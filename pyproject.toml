[project]
name = "cspeak"
version = "0.1.0"
description = "Chinese screenplay reader with emotion-aware voice synthesis"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
    "pydub>=0.25",
    "typer>=0.12",
    "rich>=13.0",
    "shellingham>=1.5",
    "httpx>=0.27",
    "ruff>=0.15.13",
]

[project.optional-dependencies]
transformers = [
    "transformers>=4.40",
    "torch>=2.0",
]
claude = [
    "anthropic>=0.40",
]


[tool.uv]
package = false   # app, not a publishable library
# CosyVoice2 must be installed separately — see setup steps.
# Add it into this env with:
#   uv pip install -e /path/to/CosyVoice'[all]'
